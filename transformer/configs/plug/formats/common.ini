[Common]
Item="Lowercase"
Command=tr '[:upper:]' '[:lower:]'

Item="Uppercase"
Command=tr '[:lower:]' '[:upper:]'

;Crème brûlée -> Creme brulee
Item="Transliterate to ASCII"
Command=uconv -x Latin-ASCII

Item="Strip trailing spaces"
Command=sed 's/[[:space:]]*$//'

Item="Sort lines"
Command=sort

Item="Unique lines"
Command=uniq

Item="Sort and unique lines"
Command=sort -u
