[Encoding]
Item="Base64 encode"
Command=base64

Item="Base64 decode"
Command=base64 -d

Item="URI encode"
Command=python3 -c 'import sys, urllib.parse; sys.stdout.write(urllib.parse.quote(sys.stdin.read(), safe=""))'

Item="URI decode"
Command=python3 -c 'import sys, urllib.parse; sys.stdout.write(urllib.parse.unquote(sys.stdin.read()))'

Item="Convert encoding"
Command=iconv
